<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis | servercodeindia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="logo">Jarvis<span>.ai</span></div>
            <p class="subtitle">AI Sales Agent by servercodeindia</p>
        </header>

        <main>
            <div class="hero">
                <div class="ai-orb">
                    <div class="orb-inner"></div>
                    <div class="orb-wave"></div>
                </div>
                <h1>Jarvis is Ready</h1>
                <p>An intelligent assistant that answers questions, tells jokes, and handles conversations at servercodeindia.</p>
            </div>

            <div class="action-zone">
                <button id="startCall" class="btn-primary">
                    <span class="btn-text">Initiate Call</span>
                    <span class="btn-loader"></span>
                </button>
                <div id="statusMessage" class="status-message"></div>
            </div>
        </main>

        <footer>
            <div class="info-grid">
                <div class="info-item">
                    <span class="label">Twilio</span>
                    <span class="value active">Connected</span>
                </div>
                <div class="info-item">
                    <span class="label">Ultravox</span>
                    <span class="value active">Live</span>
                </div>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
